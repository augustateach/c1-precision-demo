<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>C1 Precision Challenge</title>
  <style>
    :root{
      --cream:#f8f7f2;
      --paper:#fffdf7;
      --navy:#1b2a47;
      --blue:#85a1c1;
      --gold:#cfa144;
      --gold-soft:#f3e5bd;
      --ink:#25324a;
      --muted:#667085;
      --line:#ded7c8;
      --good:#2f6f4e;
      --bad:#9b3f35;
      --shadow:0 14px 34px rgba(27,42,71,.12);
      --radius:24px;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;margin:0;}
    body{
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 15% 5%, rgba(133,161,193,.28), transparent 32%),
        radial-gradient(circle at 92% 10%, rgba(207,161,68,.18), transparent 30%),
        var(--cream);
      color:var(--ink);
      overflow:hidden;
    }
    .app{
      height:100dvh;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      padding:clamp(12px,2vw,24px);
      gap:12px;
    }
    header{
      flex:0 0 auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:10px 14px;
      border:1px solid rgba(222,215,200,.8);
      background:rgba(255,253,247,.76);
      backdrop-filter:blur(12px);
      border-radius:22px;
      box-shadow:0 8px 24px rgba(27,42,71,.07);
    }
    .brand{display:flex;align-items:center;gap:12px;min-width:0;}
    .mark{
      width:42px;height:42px;border-radius:14px;
      background:linear-gradient(135deg,var(--navy),#31466d);
      color:#fff;display:grid;place-items:center;font-weight:800;letter-spacing:.04em;
      flex:0 0 auto;
    }
    h1{font-family: Georgia, 'Times New Roman', serif;margin:0;font-size:clamp(20px,2.5vw,34px);line-height:1;color:var(--navy);}
    .subtitle{margin:3px 0 0;font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .scorebox{display:flex;align-items:center;gap:10px;white-space:nowrap;}
    .pill{border:1px solid var(--line);background:#fff8e9;border-radius:999px;padding:8px 12px;font-size:13px;font-weight:700;color:var(--navy);}
    .progress-wrap{width:min(180px,22vw);height:10px;background:#ebe5d7;border-radius:999px;overflow:hidden;border:1px solid rgba(222,215,200,.8);}
    .progress{height:100%;width:0%;background:linear-gradient(90deg,var(--gold),#e5c97f);transition:width .25s ease;}
    main{
      flex:1 1 auto;
      min-height:0;
      display:flex;
      flex-direction:column;
      overflow:hidden;
      border-radius:var(--radius);
      background:rgba(255,253,247,.84);
      border:1px solid rgba(222,215,200,.8);
      box-shadow:var(--shadow);
    }
    .slide{
      flex:1 1 auto;
      min-height:0;
      overflow:auto;
      -webkit-overflow-scrolling:touch;
      padding:clamp(18px,3vw,36px);
      display:grid;
      grid-template-columns:1fr;
      align-content:start;
      gap:18px;
    }
    .kicker{font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:800;}
    .title{font-family:Georgia,'Times New Roman',serif;color:var(--navy);font-size:clamp(26px,4vw,46px);line-height:1.05;margin:0;}
    .topic{font-size:clamp(17px,2vw,24px);line-height:1.35;margin:0;color:var(--ink);font-weight:650;}
    .question{font-size:clamp(18px,2vw,25px);line-height:1.45;margin:0;color:var(--ink);}
    .lead{font-size:clamp(17px,1.7vw,21px);line-height:1.55;max-width:980px;margin:0;color:#38445d;}
    .grid-two{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start;}
    .card{border:1px solid var(--line);border-radius:22px;background:rgba(255,255,255,.7);padding:18px;}
    .options{display:grid;gap:12px;margin-top:6px;}
    .option{
      appearance:none;
      width:100%;
      text-align:left;
      border:1.5px solid var(--line);
      border-radius:18px;
      background:#fff;
      color:var(--ink);
      padding:16px 16px;
      font-size:clamp(16px,1.6vw,20px);
      line-height:1.3;
      display:flex;
      align-items:flex-start;
      gap:12px;
      cursor:pointer;
      min-height:56px;
      touch-action:manipulation;
    }
    .option:hover{border-color:var(--blue);}
    .option.selected{border-color:var(--gold);box-shadow:0 0 0 3px rgba(207,161,68,.18);background:#fffaf0;}
    .option.correct{border-color:rgba(47,111,78,.7);background:#f0f8f3;}
    .option.wrong{border-color:rgba(155,63,53,.7);background:#fff1ef;}
    .letter{font-weight:900;color:var(--navy);background:#edf2f8;border-radius:10px;min-width:34px;height:34px;display:grid;place-items:center;}
    input[type="text"]{
      width:100%;
      font-size:clamp(18px,2vw,24px);
      padding:16px 18px;
      border-radius:18px;
      border:1.5px solid var(--line);
      background:#fff;
      color:var(--navy);
      outline:none;
      min-height:58px;
    }
    input[type="text"]:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(207,161,68,.18);}
    .feedback{
      border-radius:20px;
      border:1px solid var(--line);
      background:#fbf7eb;
      padding:16px 18px;
      display:none;
      font-size:clamp(15px,1.4vw,18px);
      line-height:1.5;
    }
    .feedback.show{display:block;}
    .feedback strong{color:var(--navy);}
    .feedback.good{background:#eff8f2;border-color:rgba(47,111,78,.35);}
    .feedback.bad{background:#fff2ef;border-color:rgba(155,63,53,.35);}
    .why{display:grid;gap:10px;margin-top:10px;}
    .why div{padding:10px 12px;background:rgba(255,255,255,.65);border:1px solid rgba(222,215,200,.75);border-radius:14px;}
    .action-row{
      flex:0 0 auto;
      border-top:1px solid var(--line);
      background:rgba(255,253,247,.95);
      padding:12px clamp(14px,3vw,28px);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding-bottom:calc(12px + env(safe-area-inset-bottom));
    }
    button{font-family:inherit;}
    .btn{
      min-height:52px;
      border:none;
      border-radius:999px;
      padding:13px 20px;
      font-weight:800;
      font-size:16px;
      cursor:pointer;
      touch-action:manipulation;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
    }
    .check{background:var(--navy);color:#fff;box-shadow:0 8px 22px rgba(27,42,71,.22);min-width:170px;}
    .ghost{background:#fff;color:var(--navy);border:1px solid var(--line);min-width:136px;}
    .ghost:disabled{opacity:.45;cursor:not-allowed;}
    .counter{font-weight:850;color:var(--navy);font-size:15px;text-align:center;min-width:76px;}
    .navgroup{display:flex;align-items:center;gap:10px;}
    .tag{display:inline-flex;align-items:center;padding:7px 10px;border-radius:999px;background:#edf2f8;color:var(--navy);font-size:13px;font-weight:800;margin-right:6px;margin-bottom:6px;}
    .rank-bank,.rank-answer{display:grid;gap:10px;}
    .rank-answer{min-height:120px;border:1.5px dashed var(--line);border-radius:18px;padding:12px;background:rgba(255,255,255,.55);}
    .rank-item{border:1px solid var(--line);border-radius:16px;padding:12px 14px;background:#fff;text-align:left;font-size:16px;line-height:1.35;cursor:pointer;touch-action:manipulation;}
    .rank-item.used{opacity:.35;}
    .mini{font-size:13px;color:var(--muted);margin:0;}
    .report-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
    .metric{background:#fff;border:1px solid var(--line);border-radius:20px;padding:16px;text-align:center;}
    .metric b{font-size:30px;color:var(--navy);display:block;}
    .metric span{font-size:13px;color:var(--muted);}
    @media (max-width: 800px){
      .app{padding:8px;gap:8px;}
      header{padding:8px 10px;border-radius:18px;}
      .mark{width:36px;height:36px;border-radius:12px;}
      .subtitle{display:none;}
      .scorebox{gap:6px;}
      .progress-wrap{display:none;}
      .pill{font-size:12px;padding:7px 9px;}
      .slide{padding:16px;gap:14px;}
      .grid-two,.report-grid{grid-template-columns:1fr;}
      .action-row{padding:10px;gap:8px;flex-wrap:wrap;}
      .check{order:1;flex:1 1 100%;width:100%;}
      .navgroup{order:2;width:100%;display:grid;grid-template-columns:1fr auto 1fr;gap:8px;}
      .ghost{min-width:0;width:100%;padding:12px 10px;}
      .counter{align-self:center;}
      .option{padding:13px;min-height:52px;}
    }
  </style>
</head>
<body>
  <div class="app" role="application" aria-label="C1 Precision Challenge interactive presentation">
    <header>
      <div class="brand">
        <div class="mark">C1</div>
        <div>
          <h1>Precision Challenge</h1>
          <p class="subtitle">Collocation, register and lexical nuance</p>
        </div>
      </div>
      <div class="scorebox">
        <div class="progress-wrap" aria-hidden="true"><div class="progress" id="progress"></div></div>
        <div class="pill" id="scorePill">Score 0 / 0</div>
      </div>
    </header>
    <main>
      <section class="slide" id="slide"></section>
      <div class="action-row">
        <button class="btn check" id="checkBtn">Check answer</button>
        <div class="navgroup">
          <button class="btn ghost" id="prevBtn">← Previous</button>
          <div class="counter" id="counter">1 / 1</div>
          <button class="btn ghost" id="nextBtn">Next →</button>
        </div>
      </div>
    </main>
  </div>
<script>
const slides = [
{type:'intro', section:'C1 lexical precision', title:'C1 Precision Challenge', lead:'In this presentation, several answers may be grammatically possible. Your task is to choose the option that is most precise, natural and convincing in an advanced context.', bullets:['Focus on collocation, not translation.','Ask: what exactly is being improved, refined or developed?','After checking, read the “Why not?” section. That is where most of the learning sits.']},
{type:'mcq', section:'Part I · One excellent choice', prompt:'The internship allowed students to _____ their communication skills by working with real clients.', options:['improve','enhance','hone'], answer:2, explain:'“Hone” is strongest because the sentence describes a skill developed through repeated real-life practice.', why:['Improve is correct but broad; it does not show the training process.','Enhance is natural in formal writing, but it focuses more on increasing quality than on skill mastery.']},
{type:'mcq', section:'Part I · One excellent choice', prompt:'The university introduced several digital tools to _____ the enrolment process.', options:['simplify','optimise','streamline'], answer:2, explain:'“Streamline” is the best collocation with process: it means removing unnecessary steps to make the system faster and more efficient.', why:['Simplify is possible, but less specific.','Optimise suggests making something perform at its best, but it does not necessarily imply removing bureaucracy or friction.']},
{type:'mcq', section:'Part I · One excellent choice', prompt:'Taking part in debates helps students _____ their critical thinking.', options:['improve','sharpen','develop'], answer:1, explain:'“Sharpen critical thinking” is a precise collocation: debates make thinking more focused, analytical and accurate.', why:['Improve is safe but flat.','Develop is possible, especially over time, but it is less precise here than sharpen.']},
{type:'mcq', section:'Part I · One excellent choice', prompt:'Reading academic journals can _____ your understanding of current research.', options:['improve','enhance','cultivate'], answer:1, explain:'“Enhance your understanding” is formal, natural and suggests increasing depth or quality.', why:['Improve is correct but more basic.','Cultivate normally goes with habits, attitudes or qualities, not understanding of research.']},
{type:'mcq', section:'Part I · One excellent choice', prompt:'Before entering the laboratory, all participants attended a short _____ on safety procedures.', options:['introduction','briefing','presentation'], answer:1, explain:'A “briefing” gives practical information before an activity, especially procedures, roles or risks.', why:['Introduction is too general.','Presentation is too broad and often longer or more formal; it does not necessarily prepare people for action.']},
{type:'mcq', section:'Part I · One excellent choice', prompt:'The company experienced a _____ increase in operating costs after the new regulations were introduced.', options:['significant','steep','considerable'], answer:1, explain:'“Steep increase” suggests a sharp and probably difficult rise, which fits costs well.', why:['Significant and considerable are both correct, but they are less vivid and less precise about the speed or severity of the increase.']},
{type:'mcq', section:'Part I · One excellent choice', prompt:'Teachers should _____ students’ curiosity instead of simply providing ready-made answers.', options:['improve','cultivate','sharpen'], answer:1, explain:'“Cultivate curiosity” means to develop a quality carefully over time. This is a strong educational collocation.', why:['Improve curiosity sounds unnatural.','Sharpen usually goes with thinking, awareness, focus, instincts or arguments.']},
{type:'mcq', section:'Part I · One excellent choice', prompt:'The editor suggested several changes to _____ the author’s argument.', options:['improve','refine','foster'], answer:1, explain:'“Refine an argument” means making it more precise, polished and sophisticated.', why:['Improve is correct but weaker.','Foster means encourage growth; it does not fit an argument already being edited.']},
{type:'mcq', section:'Part I · One excellent choice', prompt:'Living abroad helped her _____ greater cultural awareness.', options:['develop','foster','enhance'], answer:0, explain:'“Develop awareness” is the most natural structure here: the awareness grows through experience.', why:['Foster usually means encourage something in others or in a group.','Enhance would need an existing level of awareness and sounds less natural with “greater”.']},
{type:'mcq', section:'Part I · One excellent choice', prompt:'The workshop was designed to _____ participants’ problem-solving abilities through practical tasks.', options:['hone','boost','improve'], answer:0, explain:'“Hone abilities through practical tasks” is precise because it shows deliberate practice.', why:['Boost suggests a quick increase and sounds lighter.','Improve is correct but does not capture the practice-based nature of the workshop.']},
{type:'input', section:'Part II · Upgrade the B2 answer', prompt:'The new software improved the application process.', instruction:'Replace the B2 verb with the strongest C1 verb.', answer:['streamlined'], explain:'The strongest upgrade is “streamlined”: the software made the process faster and less bureaucratic.'},
{type:'input', section:'Part II · Upgrade the B2 answer', prompt:'The mentor improved my presentation skills.', instruction:'Replace the B2 verb with the strongest C1 verb.', answer:['honed'], explain:'“Honed” works because mentoring suggests targeted practice and gradual refinement of a skill.'},
{type:'input', section:'Part II · Upgrade the B2 answer', prompt:'Teachers should improve students’ curiosity.', instruction:'Replace the B2 verb with the strongest C1 verb.', answer:['cultivate','foster'], explain:'“Cultivate” is excellent; “foster” also works. Curiosity is encouraged and developed over time, not simply “improved”.'},
{type:'input', section:'Part II · Upgrade the B2 answer', prompt:'The committee improved the proposal before publishing it.', instruction:'Replace the B2 verb with the strongest C1 verb.', answer:['refined'], explain:'A proposal can be “refined”: made clearer, more precise and more polished before publication.'},
{type:'input', section:'Part II · Upgrade the B2 answer', prompt:'The workshop improved participants’ analytical thinking.', instruction:'Replace the B2 verb with the strongest C1 verb.', answer:['sharpened','honed'], explain:'“Sharpened” is very natural with analytical thinking because it suggests more precise judgement. “Honed” also works if the focus is repeated practice.'},
{type:'input', section:'Part II · Upgrade the B2 answer', prompt:'The museum improved visitors’ experience with interactive exhibits.', instruction:'Replace the B2 verb with the strongest C1 verb.', answer:['enhanced'], explain:'“Enhanced visitors’ experience” is a standard formal collocation: the exhibits increased the quality of the experience.'},
{type:'input', section:'Part II · Upgrade the B2 answer', prompt:'The manager improved communication between departments.', instruction:'Replace the B2 verb with the strongest C1 verb.', answer:['strengthened','streamlined'], explain:'“Strengthened communication” is best if relationships and cooperation improved. “Streamlined communication” works if the manager reduced delays and unnecessary steps.'},
{type:'input', section:'Part II · Upgrade the B2 answer', prompt:'The new timetable improved administrative procedures.', instruction:'Replace the B2 verb with the strongest C1 verb.', answer:['streamlined'], explain:'“Streamlined administrative procedures” is precise: the timetable made the system more efficient.'},
{type:'detective', section:'Part III · Precision Detective', prompt:'The school introduced several digital tools to improve the administrative process.', choices:['digital tools','improve the administrative process','introduced several'], answer:1, replacement:'streamline the administrative process', explain:'The weak phrase is “improve the administrative process”. With “process”, the sharper verb is usually “streamline”.'},
{type:'detective', section:'Part III · Precision Detective', prompt:'The course helped students improve critical thinking through weekly debates.', choices:['improve critical thinking','weekly debates','helped students'], answer:0, replacement:'sharpen critical thinking', explain:'Debates make thinking more focused and precise, so “sharpen critical thinking” is stronger.'},
{type:'detective', section:'Part III · Precision Detective', prompt:'The charity organised a short presentation before volunteers started working.', choices:['organised','short presentation','started working'], answer:1, replacement:'briefing', explain:'Before action, especially when practical instructions are needed, “briefing” is more accurate than “presentation”.'},
{type:'detective', section:'Part III · Precision Detective', prompt:'The company faced high prices for imported materials.', choices:['faced','high prices','imported materials'], answer:1, replacement:'steep prices', explain:'“Steep prices” suggests painfully high or excessive costs. It is more expressive than “high prices”.'},
{type:'detective', section:'Part III · Precision Detective', prompt:'The editor suggested a few changes to improve the argument.', choices:['suggested a few changes','improve the argument','the editor'], answer:1, replacement:'refine the argument', explain:'Editing often refines an argument: it makes it clearer, tighter and more precise.'},
{type:'detective', section:'Part III · Precision Detective', prompt:'Good teachers should improve curiosity rather than simply provide answers.', choices:['improve curiosity','simply provide answers','good teachers'], answer:0, replacement:'cultivate curiosity / foster curiosity', explain:'Curiosity is cultivated or fostered. “Improve curiosity” is not idiomatic.'},
{type:'rank', section:'Part IV · Cambridge ranking', prompt:'Rank the sentences from most precise to least precise.', items:['The programme improved students’ skills.','The programme enhanced students’ practical communication skills through weekly negotiations with local businesses.','The programme helped students become better communicators.','The programme enabled students to hone their negotiation skills by working with real clients.'], answer:[3,1,2,0], explain:'D is the strongest: “hone negotiation skills” plus real clients gives mechanism and context. B is also strong but slightly broader. C is vague. A is the flattest.'},
{type:'rank', section:'Part IV · Cambridge ranking', prompt:'Rank the sentences from most precise to least precise.', items:['The app made learning better.','The app enhanced learners’ vocabulary retention through spaced repetition and personalised revision.','The app helped students improve their English.','The app streamlined revision by automatically identifying weak lexical areas.'], answer:[1,3,2,0], explain:'B gives the clearest learning effect and mechanism. D is precise but focuses on process efficiency. C is acceptable but general. A is too empty.'},
{type:'rank', section:'Part IV · Cambridge ranking', prompt:'Rank the sentences from most precise to least precise.', items:['The training improved staff performance.','The training sharpened staff awareness of cybersecurity risks through simulated phishing tasks.','The training was useful for staff.','The training helped workers learn about online safety.'], answer:[1,0,3,2], explain:'B is the most precise: awareness + cybersecurity risks + simulated tasks. A is acceptable but generic. D is simpler and less exact. C says almost nothing.'},
{type:'mcq', section:'Final challenge', prompt:'Which sentence is the most precise C1 sentence?', options:['The course improved students’ academic abilities and helped them succeed.','The course helped students develop useful skills for university and work.','The course honed students’ academic writing by requiring them to refine arguments, integrate sources and respond to feedback.'], answer:2, explain:'The best sentence identifies the skill, the practice mechanism and the concrete academic behaviours involved.', why:['A is polished but generic.','B is clear but broad and predictable.']},
{type:'mcq', section:'Final challenge', prompt:'Which revision best upgrades this sentence: “The meeting gave us information before the project.”', options:['The meeting provided a useful presentation before the project began.','The meeting served as a briefing, outlining the project objectives, roles and deadlines.','The meeting enhanced our understanding of the project in different ways.'], answer:1, explain:'The best revision uses “briefing” and specifies the practical content: objectives, roles and deadlines.', why:['A is acceptable but less precise.','C is abstract and padded.']},
{type:'input', section:'Final challenge', prompt:'Regular practice improved her essay writing.', instruction:'Upgrade the verb only.', answer:['honed'], explain:'“Regular practice honed her essay writing” works because repeated practice gradually refines a skill.'},
{type:'report', section:'Finish', title:'Precision Report', lead:'You have completed the C1 Precision Challenge. Use the report below to decide what to revise next.'}
];
let index = 0;
let score = 0;
let attempted = new Array(slides.length).fill(false);
let correct = new Array(slides.length).fill(false);
let selected = null;
let rankSelection = [];
const slideEl = document.getElementById('slide');
const checkBtn = document.getElementById('checkBtn');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const counter = document.getElementById('counter');
const scorePill = document.getElementById('scorePill');
const progress = document.getElementById('progress');
function esc(s){return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
function totalScored(){return slides.filter(s=>!['intro','report'].includes(s.type)).length;}
function render(){
  const s = slides[index]; selected=null; rankSelection=[];
  slideEl.scrollTop=0;
  counter.textContent = `${index+1} / ${slides.length}`;
  prevBtn.disabled = index===0;
  nextBtn.textContent = index===slides.length-1 ? 'Restart ↺' : 'Next →';
  progress.style.width = `${(index)/(slides.length-1)*100}%`;
  scorePill.textContent = `Score ${score} / ${totalScored()}`;
  checkBtn.style.visibility = ['intro','report'].includes(s.type) ? 'hidden':'visible';
  checkBtn.textContent = 'Check answer';
  if(s.type==='intro') return renderIntro(s);
  if(s.type==='mcq') return renderMcq(s);
  if(s.type==='input') return renderInput(s);
  if(s.type==='detective') return renderDetective(s);
  if(s.type==='rank') return renderRank(s);
  if(s.type==='report') return renderReport(s);
}
function baseTop(s){return `<div class="kicker">${esc(s.section||'')}</div>`;}
function renderIntro(s){
  slideEl.innerHTML = `${baseTop(s)}<h2 class="title">${esc(s.title)}</h2><p class="lead">${esc(s.lead)}</p><div class="grid-two"><div class="card"><h3>How to play</h3>${s.bullets.map(b=>`<p><span class="tag">Rule</span>${esc(b)}</p>`).join('')}</div><div class="card"><h3>The core distinction</h3><p><b>Improve</b> is often correct, but C1 writing needs a sharper verb when the context gives you one.</p><p><b>Hone, sharpen, refine, cultivate, enhance, streamline</b> all carry different meanings. That is the whole game.</p></div></div>`;
}
function renderMcq(s){
  slideEl.innerHTML = `${baseTop(s)}<p class="question">${esc(s.prompt)}</p><div class="options">${s.options.map((o,i)=>`<button class="option" data-i="${i}"><span class="letter">${String.fromCharCode(65+i)}</span><span>${esc(o)}</span></button>`).join('')}</div><div class="feedback" id="feedback"></div>`;
  slideEl.querySelectorAll('.option').forEach(btn=>btn.addEventListener('click',()=>{selected=Number(btn.dataset.i); slideEl.querySelectorAll('.option').forEach(b=>b.classList.remove('selected')); btn.classList.add('selected');}));
}
function renderInput(s){
  slideEl.innerHTML = `${baseTop(s)}<p class="question">${esc(s.prompt)}</p><p class="mini">${esc(s.instruction)}</p><input id="textAnswer" type="text" autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="Type your answer here" /><div class="feedback" id="feedback"></div>`;
  setTimeout(()=>{const inp=document.getElementById('textAnswer'); if(window.innerWidth>900) inp.focus();},50);
}
function renderDetective(s){
  slideEl.innerHTML = `${baseTop(s)}<p class="question">${esc(s.prompt)}</p><p class="mini">Tap the slightly imprecise expression.</p><div class="options">${s.choices.map((o,i)=>`<button class="option" data-i="${i}"><span class="letter">${String.fromCharCode(65+i)}</span><span>${esc(o)}</span></button>`).join('')}</div><div class="feedback" id="feedback"></div>`;
  slideEl.querySelectorAll('.option').forEach(btn=>btn.addEventListener('click',()=>{selected=Number(btn.dataset.i); slideEl.querySelectorAll('.option').forEach(b=>b.classList.remove('selected')); btn.classList.add('selected');}));
}
function renderRank(s){
  slideEl.innerHTML = `${baseTop(s)}<p class="question">${esc(s.prompt)}</p><div class="grid-two"><div class="card"><h3>Tap items in order</h3><div class="rank-bank">${s.items.map((o,i)=>`<button class="rank-item" data-i="${i}">${String.fromCharCode(65+i)}. ${esc(o)}</button>`).join('')}</div></div><div class="card"><h3>Your ranking</h3><div class="rank-answer" id="rankAnswer"><p class="mini">Your selected order will appear here.</p></div><button class="btn ghost" style="margin-top:12px;" id="resetRank">Reset</button></div></div><div class="feedback" id="feedback"></div>`;
  const answerBox=document.getElementById('rankAnswer');
  function refreshRank(){answerBox.innerHTML = rankSelection.length ? rankSelection.map((id,pos)=>`<div class="rank-item">${pos+1}. ${String.fromCharCode(65+id)}. ${esc(s.items[id])}</div>`).join('') : '<p class="mini">Your selected order will appear here.</p>'; slideEl.querySelectorAll('.rank-bank .rank-item').forEach(b=>b.classList.toggle('used',rankSelection.includes(Number(b.dataset.i))));}
  slideEl.querySelectorAll('.rank-bank .rank-item').forEach(btn=>btn.addEventListener('click',()=>{const id=Number(btn.dataset.i); if(!rankSelection.includes(id)){rankSelection.push(id); refreshRank();}}));
  document.getElementById('resetRank').addEventListener('click',()=>{rankSelection=[]; refreshRank(); document.getElementById('feedback').className='feedback'; document.getElementById('feedback').innerHTML='';});
}
function renderReport(s){
  const possible=totalScored();
  const pct=Math.round((score/possible)*100);
  let message = pct>=85 ? 'Strong lexical control. Now practise explaining why the weaker options are weaker.' : pct>=65 ? 'Good base. The next step is sharper collocation work: process, skill, attitude, argument.' : 'Revise the core collocations first. The mistakes are probably not grammar mistakes; they are meaning-and-context mistakes.';
  slideEl.innerHTML = `${baseTop(s)}<h2 class="title">${esc(s.title)}</h2><p class="lead">${esc(message)}</p><div class="report-grid"><div class="metric"><b>${score}</b><span>points</span></div><div class="metric"><b>${possible}</b><span>tasks</span></div><div class="metric"><b>${pct}%</b><span>accuracy</span></div><div class="metric"><b>C1</b><span>target</span></div></div><div class="card"><h3>Revise these pairs</h3><p><span class="tag">hone</span>skills through practice</p><p><span class="tag">sharpen</span>thinking, awareness, focus, arguments</p><p><span class="tag">enhance</span>experience, quality, effectiveness, value</p><p><span class="tag">streamline</span>processes and procedures</p><p><span class="tag">cultivate / foster</span>curiosity, independence, habits, attitudes</p><p><span class="tag">refine</span>arguments, proposals, strategies, techniques</p></div>`;
}
function markScored(ok){
  if(!attempted[index]){ attempted[index]=true; if(ok){score++; correct[index]=true;} }
  scorePill.textContent = `Score ${score} / ${totalScored()}`;
}
function check(){
  const s=slides[index]; if(['intro','report'].includes(s.type)) return;
  const fb=document.getElementById('feedback');
  let ok=false;
  if(s.type==='mcq' || s.type==='detective'){
    if(selected===null){fb.className='feedback show bad';fb.innerHTML='<strong>Choose an answer first.</strong>';return;}
    ok=selected===s.answer;
    slideEl.querySelectorAll('.option').forEach(b=>{const id=Number(b.dataset.i); b.classList.remove('correct','wrong'); if(id===s.answer) b.classList.add('correct'); if(id===selected && !ok) b.classList.add('wrong');});
    markScored(ok);
    const why = s.why ? `<div class="why">${s.why.map(w=>`<div>${esc(w)}</div>`).join('')}</div>` : '';
    const rep = s.replacement ? `<p><strong>Better:</strong> ${esc(s.replacement)}</p>` : '';
    fb.className=`feedback show ${ok?'good':'bad'}`;
    fb.innerHTML=`<strong>${ok?'Correct.':'Not quite.'}</strong><p>${esc(s.explain)}</p>${rep}${why}`;
  }
  if(s.type==='input'){
    const val=document.getElementById('textAnswer').value.trim().toLowerCase().replace(/[.!?]/g,'');
    if(!val){fb.className='feedback show bad';fb.innerHTML='<strong>Type an answer first.</strong>';return;}
    ok=s.answer.some(a=>val===a || val.includes(a));
    markScored(ok);
    fb.className=`feedback show ${ok?'good':'bad'}`;
    fb.innerHTML=`<strong>${ok?'Good choice.':'Possible, but not the target answer.'}</strong><p><strong>Target:</strong> ${s.answer.join(' / ')}</p><p>${esc(s.explain)}</p>`;
  }
  if(s.type==='rank'){
    if(rankSelection.length!==s.items.length){fb.className='feedback show bad';fb.innerHTML='<strong>Complete the full ranking first.</strong>';return;}
    ok=rankSelection.every((v,i)=>v===s.answer[i]);
    markScored(ok);
    const correctOrder=s.answer.map((id,pos)=>`${pos+1}. ${String.fromCharCode(65+id)}`).join(' → ');
    fb.className=`feedback show ${ok?'good':'bad'}`;
    fb.innerHTML=`<strong>${ok?'Correct ranking.':'Not quite.'}</strong><p><strong>Best order:</strong> ${correctOrder}</p><p>${esc(s.explain)}</p>`;
  }
}
checkBtn.addEventListener('click',check);
prevBtn.addEventListener('click',()=>{if(index>0){index--;render();}});
nextBtn.addEventListener('click',()=>{if(index<slides.length-1){index++;render();}else{index=0;score=0;attempted=new Array(slides.length).fill(false);correct=new Array(slides.length).fill(false);render();}});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight') nextBtn.click(); if(e.key==='ArrowLeft') prevBtn.click(); if(e.key==='Enter' && document.activeElement.tagName!=='BUTTON') checkBtn.click();});
render();
</script>
</body>
</html>
